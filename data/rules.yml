version: "3.1"

rules:

# USER LIKES THE QUOTE
- rule: user liked the quote
  steps:
  - intent: affirm
  - action: utter_happy_response


# USER DID NOT LIKE THE QUOTE
- rule: user wants another quote
  steps:
  - intent: deny
  - action: utter_repeat_quote
  - action: action_send_quote


# USER SAYS GOODBYE
- rule: user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye